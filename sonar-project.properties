# Base SonarQube Cloud configuration for CI-based analysis with Python coverage.
# sonar.projectKey and sonar.organization are injected by GitHub Actions
# through repository variables to avoid hard-coding account-specific values.
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8
sonar.python.version=3.11
sonar.projectVersion=uo293912_development

sonar.sources=simulator
sonar.tests=simulator
sonar.test.inclusions=simulator/test_*.py,simulator/tests/**/*.py
sonar.exclusions=simulator/test_*.py,simulator/tests/**/*.py

sonar.python.coverage.reportPaths=coverage.xml

# This repository ships Arduino support code in C, but the CI analysis only
# prepares Python coverage. Disable C-family analysis unless a compilation
# database is added in the future.
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-
